name: Deploy Backend (Render)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - 'runtime.txt'
      - 'cloudflare-worker/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s -X POST "https://api.render.com/deploy/srv-d8pm9drtqb8s738aotbg?key=obq4D7XSsqk"
